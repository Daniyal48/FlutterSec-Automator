# FlutterSec-Automator — Flutter Engine Version + Offset Map
# ============================================================
# This file serves two purposes:
#
#   1. Top-level entries:  ELF GNU Build-ID (lowercase hex) → Flutter version string
#   2. `offsets` block  :  Engine-hash → list of pre-computed SSL offset records
#
# ──────────────────────────────────────────────────────────────────────────────
# Part 1 — Build-ID → Flutter version string
# ──────────────────────────────────────────────────────────────────────────────
# How to obtain a Build-ID from a libflutter.so:
#   Option A (readelf):
#     readelf -n libflutter.so | grep "Build ID"
#   Option B (FlutterSec itself — verbose mode):
#     fluttersec analyze --apk target.apk --verbose
#
# NOTE: Build-IDs below are representative placeholders.
# Replace them with real values obtained from official Flutter release binaries.

