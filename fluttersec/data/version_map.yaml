# ──────────────────────────────────────────────────────────────────────────────
# Part 2 — Engine-hash → pre-computed SSL offsets
# ──────────────────────────────────────────────────────────────────────────────
# Format:
#   offsets:
#     "<40-char engine hash>":
#       - symbol: <function name>
#         arch: <arm64-v8a | armeabi-v7a | x86_64 | *>
#         virtual_address: <hex or decimal>
#         file_offset: <hex or decimal>
#
# These offsets are extracted from official Flutter Engine release binaries.
# They serve as a last-resort fallback when symbol and pattern scanning both fail
# (e.g. heavily stripped or obfuscated APKs).
#
# SENTINEL HASH used by unit tests — do NOT remove.
# Hash: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaf  (40 hex 'a' chars + 'f')

offsets:
